<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dynamic Meet — Live Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

    #header {
      padding: 12px 20px;
      background: #16213e;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #header h1 { font-size: 1.1rem; color: #e94560; }
    .hstat { font-size: 0.85rem; color: #aaa; }
    .hstat span { color: #4ecca3; font-weight: bold; }

    #body { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; }

    #sidebar {
      width: 300px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dir-section {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      border-bottom: 1px solid #0f3460;
    }
    .dir-section:last-child { border-bottom: none; }

    .dir-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot-a { width: 10px; height: 10px; border-radius: 50%; background: #4a90e2; display: inline-block; }
    .dot-b { width: 10px; height: 10px; border-radius: 50%; background: #e2944a; display: inline-block; }

    .dir-step {
      font-size: 0.78rem;
      color: #ccc;
      padding: 5px 0;
      border-bottom: 1px solid #0f3460;
      line-height: 1.4;
    }
    .dir-step:last-child { border-bottom: none; }
    .dir-step .dist { color: #888; font-size: 0.72rem; margin-top: 2px; }

    #info-panel {
      background: #16213e;
      padding: 8px 20px;
      display: flex;
      gap: 30px;
      border-top: 1px solid #0f3460;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { color: #888; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    #midpoint-value { color: #4ecca3; font-weight: bold; }
    #iteration-value { color: #e94560; }
  </style>
</head>
<body>

<div id="header">
  <h1>Dynamic Meet</h1>
  <div class="hstat">Status: <span id="status-text">Waiting for data...</span></div>
  <div class="hstat">Last update: <span id="last-update">—</span></div>
</div>

<div id="body">
  <div id="map"></div>

  <div id="sidebar">
    <div class="dir-section">
      <div class="dir-title"><span class="dot-a"></span> User A → Meeting Point</div>
      <div id="dirs-a"><div class="dir-step" style="color:#555">Waiting...</div></div>
    </div>
    <div class="dir-section">
      <div class="dir-title"><span class="dot-b"></span> User B → Meeting Point</div>
      <div id="dirs-b"><div class="dir-step" style="color:#555">Waiting...</div></div>
    </div>
  </div>
</div>

<div id="info-panel">
  <div class="info-item">
    <span class="info-label">User A (San Francisco)</span>
    <span>37.7749, -122.4194</span>
  </div>
  <div class="info-item">
    <span class="info-label">User B (San Jose)</span>
    <span>37.3382, -121.8863</span>
  </div>
  <div class="info-item">
    <span class="info-label">Meeting Point</span>
    <span id="midpoint-value">—</span>
  </div>
  <div class="info-item">
    <span class="info-label">Iteration</span>
    <span id="iteration-value">—</span>
  </div>
</div>

<script>
  let map, markerA, markerB, markerMid;
  let rendererA, rendererB;
  let directionsService;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 37.5630, lng: -122.1528 },
      zoom: 13,
      mapTypeId: "roadmap",
      styles: [
        { elementType: "geometry",         stylers: [{ color: "#1d2c4d" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
        { featureType: "road",             elementType: "geometry", stylers: [{ color: "#304a7d" }] },
        { featureType: "water",            elementType: "geometry", stylers: [{ color: "#0e1626" }] },
      ],
    });

    directionsService = new google.maps.DirectionsService();

    // Route A → midpoint (blue, thick)
    rendererA = new google.maps.DirectionsRenderer({
      map,
      suppressMarkers: true,
      polylineOptions: { strokeColor: "#4a90e2", strokeWeight: 7, strokeOpacity: 0.85 },
    });

    // Route B → midpoint (orange, thick)
    rendererB = new google.maps.DirectionsRenderer({
      map,
      suppressMarkers: true,
      polylineOptions: { strokeColor: "#e2944a", strokeWeight: 7, strokeOpacity: 0.85 },
    });

    // User A marker (blue)
    markerA = new google.maps.Marker({
      position: { lat: 37.7749, lng: -122.4194 },
      map,
      title: "User A",
      label: { text: "A", color: "#fff", fontWeight: "bold" },
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 11, fillColor: "#4a90e2", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 },
      zIndex: 20,
    });

    // User B marker (orange)
    markerB = new google.maps.Marker({
      position: { lat: 37.3382, lng: -121.8863 },
      map,
      title: "User B",
      label: { text: "B", color: "#fff", fontWeight: "bold" },
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 11, fillColor: "#e2944a", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2 },
      zIndex: 20,
    });

    // Meeting point marker (green)
    markerMid = new google.maps.Marker({
      map,
      title: "Meeting Point",
      visible: false,
      label: { text: "M", color: "#fff", fontWeight: "bold" },
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 13, fillColor: "#4ecca3", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 3 },
      zIndex: 30,
    });

    pollData();
    setInterval(pollData, 60000);
  }

  async function pollData() {
    try {
      const res = await fetch("output.json?t=" + Date.now());
      if (!res.ok) { document.getElementById("status-text").textContent = "Waiting for C++ program..."; return; }
      const data = await res.json();

      const mid    = { lat: data.midpoint.lat,    lng: data.midpoint.lng };
      const origin = { lat: data.origin.lat,      lng: data.origin.lng };
      const dest   = { lat: data.destination.lat, lng: data.destination.lng };

      markerMid.setPosition(mid);
      markerMid.setVisible(true);

      routeTo(origin, mid, rendererA, "dirs-a");
      routeTo(dest,   mid, rendererB, "dirs-b");

      document.getElementById("midpoint-value").textContent = mid.lat.toFixed(6) + ", " + mid.lng.toFixed(6);
      document.getElementById("iteration-value").textContent = data.iteration + " / 10";
      document.getElementById("status-text").textContent = "Live";
      document.getElementById("last-update").textContent = new Date(data.timestamp * 1000).toLocaleTimeString();

    } catch (e) {
      document.getElementById("status-text").textContent = "Waiting for C++ program...";
    }
  }

  function routeTo(from, to, renderer, panelId) {
    directionsService.route({
      origin: from,
      destination: to,
      travelMode: google.maps.TravelMode.DRIVING,
    }, (result, status) => {
      if (status !== "OK") return;
      renderer.setDirections(result);
      renderSteps(result.routes[0].legs[0].steps, panelId);
    });
  }

  function renderSteps(steps, panelId) {
    const panel = document.getElementById(panelId);
    panel.innerHTML = steps.map(s => `
      <div class="dir-step">
        <div>${s.instructions.replace(/<[^>]+>/g, "")}</div>
        <div class="dist">${s.distance.text} · ${s.duration.text}</div>
      </div>
    `).join("");
  }
</script>

<script

  async defer>
</script>

</body>
</html>
